{% load static %}
<!doctype html>
<html>
  <head>
    <title>Admin Login - MaidCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      body {
        background: #e7e0e0;
        height: 100vh;
      }

      .card {
        border-radius: 15px;
      }

      .btn:hover {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body class="d-flex align-items-center justify-content-center">
    <div class="card shadow p-4" style="width: 380px">
      <div class="text-center mb-3">
        <h4 class="fw-bold">MaidCare <i class="fa-solid fa-broom"></i></h4>
        <small class="text-muted">Admin Panel</small>
      </div>

      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}

        <input
          type="text"
          name="username"
          class="form-control mb-3"
          placeholder="Username"
          required
        />
        <input
          type="password"
          name="password"
          class="form-control mb-3"
          placeholder="Password"
          required
        />

        <button type="submit" class="btn btn-dark w-100 mb-1">
          <i class="fa fa-sign-in-alt me-1"></i> Login
        </button>

      <a href="{% url 'home' %}" class="btn btn-outline-dark w-100">
          <i class="fa fa-home me-1"></i> Home
        </a>
      </form>

      <div class="text-end mt-2">
        <a href="{% url 'admin_forgot_password' %}" class="small text-decoration-none">
          Forgot Password?
        </a>
      </div>
    </div>
  </body>
</html>
