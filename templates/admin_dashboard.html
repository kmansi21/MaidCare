<!DOCTYPE html>
<html>
<head>
    <title>MaidCare Admin Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #111;
            color: white;
            padding-top: 20px;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar .brand {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            padding: 12px 20px;
        }

        .sidebar ul li a {
            color: #ddd;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .sidebar ul li a:hover {
            color: #fff;
        }


        .arrow {
            float: right;
        }

        /* Content */
        .content {
            margin-left: 250px;
            padding: 30px;
            transition: 0.3s;
        }

        /* Cards */
        .card-box {
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .user-pill {
            background: #ffffff;
            padding: 8px 15px;
            border-radius: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        .user-pill i {
            margin-right: 8px;
        }

@media (max-width: 768px) {

    .sidebar {
        left: -250px;
    }

    .sidebar.active {
        left: 0;
    }

    .content {
        margin-left: 0;
        padding: 20px;
    }


    .content h4 {
        font-size: 16px;
        font-weight: 500;
    }

    .user-pill {
        padding: 5px 5px;
        font-size: 12px;
    }

    .card-box h3 {
        font-size: 20px;
    }

    .overlay {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
        top: 0;
        left: 0;
        z-index: 999;
    }

    .overlay.active {
        display: block;
    }
}
    </style>
</head>

<body>

<!-- Overlay (for mobile) -->
<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

  <div class="d-flex justify-content-between align-items-center px-3">
    <div class="brand mb-0">
        MaidCare 
        <i class="fa-solid fa-broom ms-1 fa-flip-horizontal"></i>
    </div>

    <!-- Close Button (Mobile Only) -->
    <button class="btn text-white d-md-none" id="close-btn">
        <i class="fa fa-times"></i>
    </button>
</div>
<hr class="text-secondary">

    <ul class="sidebar-menu">

        <li>
            <a href="/admindashboard/">
                <i class="fa fa-tachometer-alt me-2"></i> Dashboard
            </a>
        </li>

        <li class="toggle">
            <a href="/category/">
                <i class="fa fa-list me-2"></i> Category 
         
            </a>
      
        </li>

        <li class="toggle">
            <a href="/housekeeper/">
                <i class="fa fa-user-friends me-2"></i> Housekeeper 
               
            </a>
          
        </li>

        <li class="toggle">
            <a href="/hiring/">
                <i class="fa fa-file-alt me-2"></i> Hiring Requests 
               
            </a>
       
        </li>

        <li>
            <a href="/logout/">
                <i class="fa fa-sign-out-alt me-2"></i> Logout
            </a>
        </li>

    </ul>
</div>

<!-- Main Content -->
<div class="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <!-- Mobile Hamburger -->
        <button class="btn btn-dark d-md-none" id="menu-btn">
            <i class="fa fa-bars"></i>
        </button>

        <h4 class="mb-0">Dashboard Overview</h4>

        <div class="user-pill">
            <i class="fa fa-user-circle text-dark"></i>
            <span class="fw-semibold">{{admin_name}}</span>
        </div>
    </div>

    <!-- Cards -->
    <div class="row">

        <div class="col-lg-3 col-md-6">
            <div class="card-box text-center">
                <h6>Total Requests</h6>
                <h3>{{ total_requests }}</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card-box text-center">
                <h6>New Requests</h6>
                <h3 class="text-primary">{{ new_requests }}</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card-box text-center">
                <h6>Total Housekeepers</h6>
                 <h3 class="text-success">{{ total_housekeepers }}</h3>
            </div>
        </div>

        <div class="col-lg-3 col-md-6">
            <div class="card-box text-center">
                <h6>Pending Requests</h6>
               <h3 class="text-warning">{{ pending_requests }}</h3>
            </div>
        </div>

    </div>

</div>

<!-- Scripts -->
<script>

document.querySelectorAll(".toggle > a").forEach(item => {
    item.addEventListener("click", function(e) {
        let submenu = this.nextElementSibling;

        if (submenu) {   // only if submenu exists
            e.preventDefault();
            submenu.style.display =
                submenu.style.display === "block" ? "none" : "block";
        }
    });
});

    const closeBtn = document.getElementById("close-btn");

closeBtn.addEventListener("click", () => {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
});
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("active");
    });

</script>

</body>
</html>
