{% load static %}
<!doctype html>
<html>
  <head>
    <title>User Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body
    class="d-flex align-items-center justify-content-center"
    style="height: 100vh; background: #f4f6f9"
  >
    <div class="card p-4 shadow" style="width: 400px">
      <h4 class="text-center mb-3">User Login</h4>

      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}

      <form method="POST" action="{% url 'user_login' %}">
        {% csrf_token %}

        <input
          type="email"
          name="email"
          placeholder="Email"
          class="form-control mb-3"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          class="form-control mb-3"
          required
        />

        <button class="btn btn-dark w-100 mb-1">
          <i class="fa fa-sign-in-alt me-1"></i>Login
        </button>
      </form>
      <a href="{% url 'home' %}" class="btn btn-outline-dark w-100">
        <i class="fa fa-home me-1"></i> Home
      </a>
      <div class="text-center mt-3">
        <a href="{% url 'user_register' %}">Create new account</a>
      </div>
      <div class="text-end mt-2">
        <a href="{% url 'user_forgot_password' %}" class="small text-decoration-none">
          Forgot Password?
        </a>
      </div>
    </div>
  </body>
</html>
