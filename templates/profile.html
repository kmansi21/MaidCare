{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Profile - MaidCare</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f6fa;
        font-family: "Poppins", sans-serif;
      }

      .profile-card {
        max-width: 500px;
        margin: auto;
        border-radius: 20px;
        border: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .profile-header {
        background: #111;
        color: white;
        padding: 30px;
        border-radius: 20px 20px 0 0;
        text-align: center;
      }

      .profile-header i {
        font-size: 50px;
        margin-bottom: 10px;
      }

      .profile-body {
        padding: 25px;
      }

      .info-box {
        padding: 12px;
        background: #f8f9fa;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .btn-edit {
        border-radius: 30px;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <div class="card profile-card">
        <!-- Header -->
        <div class="profile-header">
          <i class="fa fa-user-circle"></i>
          <h4>{{ user.name }}</h4>
          <small>{{ user.email }}</small>
        </div>

        <!-- Body -->
        <div class="profile-body">
          <div class="info-box">
            <strong>Name:</strong><br />
            {{ user.name }}
          </div>

          <div class="info-box">
            <strong>Email:</strong><br />
            {{ user.email }}
          </div>

          <div class="info-box">
            <strong>Phone:</strong><br />
            {{ user.phone|default:"Not Provided" }}
          </div>

          <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4 btn-edit">
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
